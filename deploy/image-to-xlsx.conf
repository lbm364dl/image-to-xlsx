# Apache virtual host configuration for image-to-xlsx
# Install to: /etc/httpd/conf.d/image-to-xlsx.conf

<VirtualHost *:80>
    # Replace with your actual server hostname or IP
    # ServerName your-server-hostname.example.com

    # --- Reverse proxy to NiceGUI/uvicorn backend ---

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    # WebSocket proxy for Socket.IO (NiceGUI real-time UI updates)
    # This MUST come before the general ProxyPass rule
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:8080/$1" [P,L]

    # HTTP proxy for all other requests
    ProxyPass "/" "http://127.0.0.1:8080/"
    ProxyPassReverse "/" "http://127.0.0.1:8080/"

    # Allow large file uploads (100 MB)
    LimitRequestBody 104857600

    # Timeouts for long-running extraction requests
    ProxyTimeout 600
    Timeout 600

    ErrorLog logs/image-to-xlsx-error.log
    CustomLog logs/image-to-xlsx-access.log combined
</VirtualHost>
